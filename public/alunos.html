<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alunos – GymControl</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title" id="page-title">Alunos</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </header>
    <main class="page-content">

      <div class="page-header">
        <div>
          <h2>Gerenciar Alunos</h2>
          <p class="subtitle">Cadastre, edite e controle os alunos da academia</p>
        </div>
        <button class="btn btn-primary" onclick="abrirModalNovoAluno()">
          ➕ Novo Aluno
        </button>
      </div>

      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="busca-alunos" placeholder="Buscar por nome, turma ou professor..." />
        </div>
        <select class="form-control" id="filtro-status" style="max-width:180px">
          <option value="">Todos os status</option>
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
          <option value="Pendente">Pendente</option>
        </select>
      </div>

      <!-- TABELA — tbody vazio, preenchido via GET /api/alunos -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Lista de Alunos</span>
          <span style="font-size:13px;color:var(--gray-500)">
            Total: <strong id="total-alunos">0 alunos</strong>
          </span>
        </div>
        <div class="table-wrap">
          <table id="tabela-alunos">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Turma</th>
                <th>Professor</th>
                <th>Telefone</th>
                <th>Matrícula</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="lista-alunos">
              <tr>
                <td colspan="8" style="text-align:center;color:var(--gray-500);padding:32px">
                  Nenhum aluno cadastrado. Clique em <strong>➕ Novo Aluno</strong> para começar.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--gray-100)">
          <span id="info-registros" style="font-size:13px;color:var(--gray-500)">0 registros</span>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- MODAL CADASTRO / EDIÇÃO DE ALUNO -->
<div class="modal-overlay" id="modal-aluno">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-aluno-titulo">➕ Cadastrar Novo Aluno</span>
      <button class="modal-close" onclick="closeModal('modal-aluno')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="aluno-id" value="" />
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Código do Aluno</label>
          <input type="text" id="aluno-codigo" class="form-control" readonly
                 style="background:var(--gray-50)" placeholder="Gerado automaticamente" />
        </div>
        <div class="form-group">
          <label class="form-label">Data de Matrícula</label>
          <input type="text" id="aluno-data-matricula" name="data_matricula"
                 class="form-control" placeholder="DD/MM/AAAA" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nome Completo *</label>
        <input type="text" id="aluno-nome" name="nome"
               class="form-control" placeholder="Ex: João da Silva" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">CPF *</label>
          <input type="text" id="aluno-cpf" name="cpf"
                 class="form-control" placeholder="000.000.000-00" />
        </div>
        <div class="form-group">
          <label class="form-label">Idade</label>
          <input type="number" id="aluno-idade" name="idade"
                 class="form-control" placeholder="Ex: 25" min="1" max="120" />
        </div>
        <div class="form-group">
          <label class="form-label">Sexo</label>
          <select id="aluno-sexo" name="sexo" class="form-control">
            <option value="1">Masculino</option>
            <option value="2">Feminino</option>
            <option value="3">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="text" id="aluno-telefone" name="telefone"
                 class="form-control" placeholder="(00) 00000-0000" />
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="aluno-email" name="email"
                 class="form-control" placeholder="email@exemplo.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Peso (kg)</label>
          <input type="number" id="aluno-peso" name="peso_kg"
                 class="form-control" placeholder="Ex: 75.5" step="0.1" />
        </div>
        <div class="form-group">
          <label class="form-label">Altura (m)</label>
          <input type="number" id="aluno-altura" name="altura_m"
                 class="form-control" placeholder="Ex: 1.78" step="0.01" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Turma</label>
          <select id="aluno-turma" name="id_turma" class="form-control">
            <option value="0">Selecionar turma...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Professor Responsável</label>
          <select id="aluno-professor" name="id_professor" class="form-control">
            <option value="0">Selecionar professor...</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="aluno-status" name="status" class="form-control">
          <option value="1">Ativo</option>
          <option value="0">Inativo</option>
          <option value="2">Pendente</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-aluno')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAluno()">💾 Salvar Aluno</button>
    </div>
  </div>
</div>

<script src="gymcontrol.js"></script>
<script>
  buildSidebar('alunos');
  buildTopbar('Alunos');
  carregarAlunos();
  filterTable('busca-alunos', 'tabela-alunos');
</script>
</body>
</html>
